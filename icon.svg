<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </radialGradient>
    <radialGradient id="dot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#33ff95"/>
      <stop offset="60%" stop-color="#00e87a"/>
      <stop offset="100%" stop-color="#00a050"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Concentric radar rings -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#00e87a" stroke-width="2" opacity="0.25"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="#00e87a" stroke-width="2" opacity="0.35"/>
  <circle cx="256" cy="256" r="100" fill="none" stroke="#00e87a" stroke-width="2" opacity="0.5"/>
  <circle cx="256" cy="256" r="50"  fill="none" stroke="#00e87a" stroke-width="2" opacity="0.7"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="32" fill="url(#dot)"/>
  <circle cx="256" cy="256" r="32" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.9"/>
  <!-- Crosshair lines -->
  <line x1="256" y1="40"  x2="256" y2="80"  stroke="#00e87a" stroke-width="3" opacity="0.6"/>
  <line x1="256" y1="432" x2="256" y2="472" stroke="#00e87a" stroke-width="3" opacity="0.6"/>
  <line x1="40"  y1="256" x2="80"  y2="256" stroke="#00e87a" stroke-width="3" opacity="0.6"/>
  <line x1="432" y1="256" x2="472" y2="256" stroke="#00e87a" stroke-width="3" opacity="0.6"/>
</svg>
